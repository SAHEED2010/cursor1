<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shopping Card Demo</title>
<style>
:root {
--bg: #f8fafc;
--fg: #0f172a;
--card-bg: #ffffff;
--card-fg: #0f172a;
--accent: #2563eb;
--muted: #64748b;
--shadow: 0 6px 20px rgba(0,0,0,0.12);
}
.dark {
--bg: #0b1220;
--fg: #e2e8f0;
--card-bg: #111827;
--card-fg: #e5e7eb;
--accent: #60a5fa;
--muted: #94a3b8;
--shadow: 0 10px 30px rgba(0,0,0,0.45);
}
html, body {
background: var(--bg);
color: var(--fg);
font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol;
}
#themeToggle {
display: block;
margin: 16px auto;
padding: 8px 12px;
border-radius: 8px;
border: 1px solid var(--fg);
background: transparent;
color: var(--fg);
cursor: pointer;
transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease;
}
#themeToggle:hover {
background-color: rgba(0,0,0,0.06);
}
.dark #themeToggle:hover {
background-color: rgba(255,255,255,0.08);
}
.card {
width: 300px;
margin: 24px auto;
background-color: var(--card-bg);
box-shadow: var(--shadow);
border-radius: 12px;
overflow: hidden;
text-align: left;
transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
will-change: transform, box-shadow;
}
.card:hover {
transform: translateY(-4px);
box-shadow: 0 14px 40px rgba(0,0,0,0.18);
}
.card__image {
display: block;
width: 100%;
height: 180px;
object-fit: cover;
}
.card__body {
padding: 14px;
display: grid;
gap: 8px;
}
.card__title {
font-size: 22px;
font-weight: bold;
margin: 0;
color: var(--card-fg);
}
.card__price {
font-size: 18px;
color: green;
margin: 0;
}
.card__features {
list-style: none;
padding-left: 0;
margin: 0;
}
.card__features li {
padding: 6px 0;
border-bottom: 1px solid #eee;
}
.dark .card__features li {
border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card__action {
background: var(--accent);
color: white;
padding: 10px 20px;
border: none;
margin-top: 10px;
border-radius: 8px;
cursor: pointer;
transition: filter 160ms ease, transform 120ms ease;
}
.card__action:hover {
filter: brightness(1.05);
transform: translateY(-1px);
}
.card__action:active {
transform: translateY(0);
}
</style>
</head>
<body>

<button id="themeToggle" aria-pressed="false">Toggle Theme</button>
<div class="card">
<img class="card__image" src="https://via.placeholder.com/300x180?text=Product" alt="Product image">
<div class="card__body">
<h2 class="card__title">Basic Plan</h2>
<p class="card__price">$9.99 / month</p>
<ul class="card__features">
<li>1 GB Storage</li>
<li>Basic Support</li>
<li>All Core Features</li>
</ul>
<button class="card__action">Start Trial</button>
</div>
</div>
<script>
(function initThemeToggle() {
var toggle = document.getElementById('themeToggle');
var root = document.documentElement;
try {
var saved = localStorage.getItem('theme');
if (saved === 'dark') {
root.classList.add('dark');
if (toggle) toggle.setAttribute('aria-pressed', 'true');
}
} catch (e) {}
if (toggle) {
toggle.addEventListener('click', function () {
var isDark = root.classList.toggle('dark');
toggle.setAttribute('aria-pressed', String(isDark));
try {
localStorage.setItem('theme', isDark ? 'dark' : 'light');
} catch (e) {}
});
}
})();
</script>

</body>
</html>
